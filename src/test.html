<!DOCTYPE html>
<html>
<head>
    <title>前后端测试</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <h1>前后端通信测试</h1>
    <button onclick="testBackend()">测试后端</button>
    <div id="result"></div>

    <script>
        async function testBackend() {
            try {
                const response = await axios.get('/api/test');
                document.getElementById('result').innerHTML = '测试成功: ' + response.data;
            } catch (error) {
                document.getElementById('result').innerHTML = '测试失败: ' + error.message;
            }
        }
    </script>
</body>
</html>
